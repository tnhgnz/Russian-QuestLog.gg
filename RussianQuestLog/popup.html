<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RussianQuestLog</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 12px 14px 14px;
        min-width: 220px;
        font: 13px/1.4 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: #e5e7eb;
        background: #161616;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 13px;
        font-weight: 700;
        color: #f9fafb;
      }
      fieldset {
        margin: 0;
        padding: 0;
        border: 0;
      }
      label {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        margin-bottom: 6px;
        border-radius: 8px;
        border: 1px solid #282828;
        background: #1c1c1c;
        cursor: pointer;
      }
      label:hover {
        border-color: #3f3f46;
      }
      input {
        margin: 0;
        accent-color: #93c5fd;
      }
      .hint {
        margin-top: 10px;
        font-size: 11px;
        color: #9ca3af;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <h1>Синергия рун</h1>
    <fieldset>
      <label>
        <input type="radio" name="tier" value="t2" />
        T2 — <code>runes/t2.json</code>
      </label>
      <label>
        <input type="radio" name="tier" value="t3" />
        T3 — <code>runes/t3.json</code>
      </label>
    </fieldset>
    <p class="hint">
      Выбор сохраняется. Открытые вкладки QuestLog не подхватят смену сами! Обновите страницу.
    </p>
    <script src="popup.js"></script>
  </body>
</html>
